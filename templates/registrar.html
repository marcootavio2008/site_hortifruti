{% extends "base.html" %}
{% block title %}Registrar {{ tipo|capitalize }}{% endblock %}

{% block content %}
<h2>Registrar {{ tipo|capitalize }}</h2>

<form method="post">
    <label>Produto</label>
    <input type="text" name="produto" required>

    <label>Quantidade</label>
    <input name="quantidade" required>

    <button type="submit" class="primary">
        Salvar {{ tipo|capitalize }}
    </button>
</form>

<br>

<a href="/">Voltar ao menu</a>
{% endblock %}
